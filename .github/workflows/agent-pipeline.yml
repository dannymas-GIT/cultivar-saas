# ==============================================================================
# Agent CI/CD Pipeline - Reusable GitHub Actions Workflow
# ==============================================================================
# Copy this workflow to your repo's .github/workflows/ directory.
# Configure the inputs and secrets for your application.
#
# Required Secrets:
#   TELEGRAM_BOT_TOKEN   - Telegram bot token for OpenClaw notifications
#   TELEGRAM_CHAT_ID     - Telegram chat ID for notifications
#   DEPLOY_SSH_KEY       - SSH private key for staging/production deploy
#   STAGING_HOST         - Staging server hostname/IP
#   DEPLOY_USER          - SSH user for deployment
#
# Optional Secrets:
#   GITHUB_TOKEN         - Auto-provided by GitHub Actions
#   TRIVY_TOKEN          - For container scanning (optional)
# ==============================================================================

name: Agent CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (staging or production)'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_agents:
        description: 'Skip OpenClaw agent checks'
        required: false
        default: false
        type: boolean

# Cancel in-progress runs for the same PR
concurrency:
  group: pipeline-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: ${{ vars.APP_NAME || 'myapp' }}
  STAGING_URL: ${{ vars.STAGING_URL || 'https://staging.example.com' }}
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # Stage 1: Static Analysis (Parallel)
  # ============================================================================

  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.summary.outputs.result }}
      details: ${{ steps.summary.outputs.details }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect stack
        id: detect
        run: |
          if [ -f "package.json" ]; then echo "has_node=true" >> $GITHUB_OUTPUT; fi
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then echo "has_python=true" >> $GITHUB_OUTPUT; fi
          if [ -f "Dockerfile" ] || [ -f "docker-compose.yml" ]; then echo "has_docker=true" >> $GITHUB_OUTPUT; fi

      # Node dependency audit
      - name: Setup Node
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: NPM Audit
        if: steps.detect.outputs.has_node == 'true'
        id: npm_audit
        continue-on-error: true
        run: |
          cd frontend 2>/dev/null || cd .
          npm audit --json > /tmp/npm-audit.json 2>&1 || true
          CRITICAL=$(cat /tmp/npm-audit.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat /tmp/npm-audit.json | jq '.metadata.vulnerabilities.high // 0')
          echo "npm_critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "npm_high=$HIGH" >> $GITHUB_OUTPUT

      # Python dependency audit
      - name: Setup Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Pip Audit
        if: steps.detect.outputs.has_python == 'true'
        id: pip_audit
        continue-on-error: true
        run: |
          pip install pip-audit
          cd backend 2>/dev/null || cd .
          pip-audit -r requirements.txt --format json --output /tmp/pip-audit.json 2>&1 || true
          VULNS=$(cat /tmp/pip-audit.json | jq 'length // 0')
          echo "pip_vulns=$VULNS" >> $GITHUB_OUTPUT

      # Secret scanning
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        id: gitleaks
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # License check
      - name: License Check
        if: steps.detect.outputs.has_node == 'true'
        id: license
        continue-on-error: true
        run: |
          npx license-checker --json --failOn "GPL-2.0;GPL-3.0;AGPL-3.0" > /tmp/licenses.json 2>&1 || true

      # Container scan
      - name: Trivy Container Scan
        if: steps.detect.outputs.has_docker == 'true'
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: '/tmp/trivy-results.json'
          severity: 'CRITICAL,HIGH'

      - name: Summarize Security
        id: summary
        run: |
          CRITICAL=${npm_critical:-0}
          HIGH=${npm_high:-0}
          SECRETS=${{ steps.gitleaks.outcome == 'failure' && '1' || '0' }}

          if [ "$CRITICAL" -gt 0 ] || [ "$SECRETS" -gt 0 ]; then
            echo "result=FAIL" >> $GITHUB_OUTPUT
          elif [ "$HIGH" -gt 0 ]; then
            echo "result=WARN" >> $GITHUB_OUTPUT
          else
            echo "result=PASS" >> $GITHUB_OUTPUT
          fi

          echo "details=${CRITICAL} critical, ${HIGH} high vulns; secrets_found=${SECRETS}" >> $GITHUB_OUTPUT

  lint-check:
    name: "🧹 Lint & Style"
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.summary.outputs.result }}
      details: ${{ steps.summary.outputs.details }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect stack
        id: detect
        run: |
          if [ -f "package.json" ]; then echo "has_node=true" >> $GITHUB_OUTPUT; fi
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then echo "has_python=true" >> $GITHUB_OUTPUT; fi

      # Frontend linting
      - name: Setup Node
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install frontend deps
        if: steps.detect.outputs.has_node == 'true'
        run: |
          cd frontend 2>/dev/null || cd .
          npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: ESLint
        if: steps.detect.outputs.has_node == 'true'
        id: eslint
        continue-on-error: true
        run: |
          cd frontend 2>/dev/null || cd .
          npx eslint . --format json --output-file /tmp/eslint-results.json 2>&1 || true
          ERRORS=$(cat /tmp/eslint-results.json | jq '[.[].errorCount] | add // 0')
          WARNINGS=$(cat /tmp/eslint-results.json | jq '[.[].warningCount] | add // 0')
          echo "eslint_errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "eslint_warnings=$WARNINGS" >> $GITHUB_OUTPUT

      - name: Prettier Check
        if: steps.detect.outputs.has_node == 'true'
        id: prettier
        continue-on-error: true
        run: |
          cd frontend 2>/dev/null || cd .
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,json}" 2>&1 | tail -20 || true

      # Backend linting
      - name: Setup Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ruff Lint
        if: steps.detect.outputs.has_python == 'true'
        id: ruff
        continue-on-error: true
        run: |
          pip install ruff
          cd backend 2>/dev/null || cd .
          ruff check . --output-format json > /tmp/ruff-results.json 2>&1 || true
          ERRORS=$(cat /tmp/ruff-results.json | jq 'length // 0')
          echo "ruff_errors=$ERRORS" >> $GITHUB_OUTPUT

      - name: MyPy Type Check
        if: steps.detect.outputs.has_python == 'true'
        id: mypy
        continue-on-error: true
        run: |
          pip install mypy
          cd backend 2>/dev/null || cd .
          mypy . --ignore-missing-imports --no-error-summary 2>&1 | tail -5 || true

      - name: Summarize Lint
        id: summary
        run: |
          ESLINT_ERR=${{ steps.eslint.outputs.eslint_errors || 0 }}
          RUFF_ERR=${{ steps.ruff.outputs.ruff_errors || 0 }}
          TOTAL=$((ESLINT_ERR + RUFF_ERR))

          if [ "$TOTAL" -gt 0 ]; then
            echo "result=FAIL" >> $GITHUB_OUTPUT
          else
            echo "result=PASS" >> $GITHUB_OUTPUT
          fi

          echo "details=eslint_errors=${ESLINT_ERR}, ruff_errors=${RUFF_ERR}" >> $GITHUB_OUTPUT

  # ============================================================================
  # Stage 2: Build & Unit Tests
  # ============================================================================

  build-test:
    name: "🔨 Build & Test"
    runs-on: ubuntu-latest
    needs: [security-scan, lint-check]
    outputs:
      result: ${{ steps.summary.outputs.result }}
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ env.APP_NAME }}:pr-${{ github.event.pull_request.number || 'manual' }}-$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: Build Docker images
        id: build
        run: |
          if [ -f "docker-compose.yml" ]; then
            docker compose build --parallel 2>&1
          elif [ -f "Dockerfile" ]; then
            docker build -t ${{ steps.meta.outputs.tag }} . 2>&1
          fi

      - name: Run unit tests
        id: tests
        continue-on-error: true
        run: |
          if [ -f "docker-compose.yml" ]; then
            docker compose run --rm backend pytest --tb=short --json-report --json-report-file=/tmp/test-results.json 2>&1 || true
          elif [ -f "pytest.ini" ] || [ -f "pyproject.toml" ]; then
            pip install -r requirements.txt 2>/dev/null || true
            pytest --tb=short 2>&1 || true
          fi

      - name: Summarize Build
        id: summary
        run: |
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            echo "result=FAIL" >> $GITHUB_OUTPUT
          elif [ "${{ steps.tests.outcome }}" = "failure" ]; then
            echo "result=FAIL" >> $GITHUB_OUTPUT
          else
            echo "result=PASS" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Stage 3: Deploy to Staging
  # ============================================================================

  deploy-staging:
    name: "🚀 Deploy Staging"
    runs-on: ubuntu-latest
    needs: [build-test]
    if: needs.build-test.outputs.result == 'PASS'
    environment: staging
    outputs:
      result: ${{ steps.deploy.outputs.result }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        id: deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.STAGING_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$USER@$HOST" << 'DEPLOY_SCRIPT'
            cd ${{ vars.DEPLOY_DIR || '/opt/projects/' }}${{ env.APP_NAME }}
            git fetch origin
            git checkout ${{ github.head_ref || github.ref_name }}
            git pull origin ${{ github.head_ref || github.ref_name }}
            docker compose -f docker-compose.staging.yml up -d --build
          DEPLOY_SCRIPT

          echo "result=PASS" >> $GITHUB_OUTPUT
          echo "url=${{ env.STAGING_URL }}" >> $GITHUB_OUTPUT

      - name: Health check
        id: health
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.STAGING_URL }}/api/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS - retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

  # ============================================================================
  # Stage 4: Notify OpenClaw Agents
  # ============================================================================

  notify-agents:
    name: "🤖 Notify OpenClaw Agents"
    runs-on: ubuntu-latest
    needs: [security-scan, lint-check, build-test, deploy-staging]
    if: |
      always() &&
      !cancelled() &&
      github.event.inputs.skip_agents != 'true'
    steps:
      - name: Send pipeline results to OpenClaw
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Build notification message
          SECURITY="${{ needs.security-scan.outputs.result || 'SKIP' }}"
          LINT="${{ needs.lint-check.outputs.result || 'SKIP' }}"
          BUILD="${{ needs.build-test.outputs.result || 'SKIP' }}"
          DEPLOY="${{ needs.deploy-staging.outputs.result || 'SKIP' }}"
          STAGING_URL="${{ needs.deploy-staging.outputs.url || 'N/A' }}"

          MSG="🔔 Pipeline Report — PR #${{ github.event.pull_request.number }}%0A"
          MSG+="App: ${{ env.APP_NAME }}%0A"
          MSG+="Repo: ${{ github.repository }}%0A"
          MSG+="Branch: ${{ github.head_ref || github.ref_name }}%0A"
          MSG+="Commit: $(echo ${{ github.sha }} | head -c7)%0A%0A"
          MSG+="Security .... ${SECURITY} (${{ needs.security-scan.outputs.details || 'n/a' }})%0A"
          MSG+="Linting ..... ${LINT} (${{ needs.lint-check.outputs.details || 'n/a' }})%0A"
          MSG+="Build ....... ${BUILD}%0A"
          MSG+="Staging ..... ${DEPLOY} (${STAGING_URL})%0A%0A"
          MSG+="⏳ Running agent checks (QA, UI/A11y, Logic Review)...%0A"
          MSG+="PR: https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"

          # Send to Telegram
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="HTML"

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              description: 'OpenClaw agents running QA, UI, and Logic checks...',
              context: 'openclaw/agent-pipeline'
            });
